<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Website Risk Checker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="container">
    <h1>Website Risk Checker</h1>

    <p class="subtitle">
      Evidence‑based risk assessment for Australian consumers.
      If information cannot be verified, the score is conservative.
    </p>

    <div class="input-card">
      <input
        id="siteUrl"
        type="url"
        placeholder="https://example.com"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="analyzeBtn">Analyze</button>
    </div>

    <div id="error" class="error hidden"></div>

    <section id="results" class="results hidden">
      <h2>Assessment Result</h2>

      <div class="score">
        <span>Total Score</span>
        <strong id="totalScore">–</strong><span>/100</span>
      </div>

      <div id="verdict" class="verdict"></div>
